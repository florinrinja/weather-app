name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
            node-version: 20
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build the project
        run: npm run build
        env:
            PUBLIC_URL: /

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
        
      - name: Create preview folder
        run: ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@${{ secrets.DEPLOY_HOST }} "mkdir -p /var/www/apps/preview/weather-pr-${{ github.event.pull_request.number }}"

      - name: Copy to VPS
        run: rsync -av -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" build/ deploy@${{ secrets.DEPLOY_HOST }}:/var/www/apps/preview/weather-pr-${{ github.event.pull_request.number }}/

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Preview deployed at https://weather-pr-${{ github.event.pull_request.number }}.florinrinja.website'
            })